<!DOCTYPE html>
<html>
<head>
<title>Google Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
}

#container{
    text-align:center;
    margin-top:20px;
}

#logo{
    font-size:60px;
    font-weight:normal;
}

.blue{
color:#4285F4;
}
.red{
color:#EA4335;
}
.yellow{
color:#FBBC05;
}
.green{
color:#34A853;
}

#title{
    font-size:42px;
    font-family:Georgia;
    color:#333;
    margin-top:10px;
}

#subtitle{
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
}

#login-box{
    width:400px;
    height:320px;
    background:#ececec;
    margin:30px auto;
    padding:50px 40px;
    box-sizing:border-box;
    box-shadow:0px 2px 8px rgba(0,0,0,0.4);
}

.input-box{
    width:100%;
    height:38px;
    margin-bottom:12px;
    border:1px solid #c0c0c0;
    padding-left:10px;
    box-sizing:border-box;
}

#signin-btn{
    width:100%;
    height:40px;
    border:none;
    background:#1a73e8;
    color:white;
    font-size:24px;
    border-radius:3px;
    cursor:pointer;
}

#bottom-row{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

#help{
    color:purple;
    text-decoration:none;
}

#create{
    margin-top:15px;
    color:purple;
}

#footer{
    margin-top:10px;
    font-size:18px;
}

</style>
</head>

<body>

<div id="container">

    <div id="logo">
        <span class="blue">G</span>
        <span class="red">o</span>
        <span class="yellow">o</span>
        <span class="blue">g</span>
        <span class="green">l</span>
        <span class="red">e</span>
    </div>

    <div id="title">
        One account. All of Google.
    </div>

    <div id="subtitle">
        Sign in to Continue to Gmail
    </div>

    <div id="login-box">

        <input type="text" class="input-box" placeholder="Email">

        <input type="password" class="input-box" placeholder="Password">

        <button id="signin-btn">Sign in</button>

        <div id="bottom-row">
            <div>
                <input type="checkbox"> Stay signed in
            </div>

            <a href="#" id="help">Need Help?</a>
        </div>

    </div>

    <div id="create">
        Create an account
    </div>

    <div id="footer">
        One Google Account for everything Google
    </div>

</div>

</body>
</html>
