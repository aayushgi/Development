<html>
<head></head>
<body>
<fieldset>
<legend>Pattient Appointment</legend>
<table>
<form>
<tr>
<td>Patient Name</td>
<td><input type="text" name="pname"/></td>
</tr>

<tr>
<td>Father/Guardian Name</td>
<td><input type="text" name="gname"/></td>
</tr>

<tr>
<td>Age</td>
<td><input type="number" name="age"/></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="gender"/>Male
<input type="radio" name="gender"/>Female
<input type="radio" name="gender"/>Other
</td>
</tr>

<tr>
<td>Mobile Number</td>
<td><input type="tel" name="mobile"/></td>
</tr>

<tr>
<td>Email</td>
<td><input type="email" name="email"/></td>
</tr>

<tr>
<td>Address</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td>City</td>
<td><input type="text" name="city"/></td>
</tr>

<tr>
<td>Blood Group</td>
<td>
<select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</td>
</tr>

<tr>
<td>Department</td>
<td>
<select>
<option>Cardiology</option>
<option>Orthopedic</option>
<option>Neurology</option>
<option>ENT</option>
<option>Dermatology</option>
<option>General Physician</option>
</select>
</td>
</tr>

<tr>
<td>Doctor Name</td>
<td><input type="text" name="doctor"/></td>
</tr>

<tr>
<td>Appointment Date</td>
<td><input type="date"/></td>
</tr>

<tr>
<td>Appointment Time</td>
<td><input type="time"/></td>
</tr>

<tr>
<td>Symptoms</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td>Previous Diseases</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td>Medical Report</td>
<td><input type="file"/></td>
</tr>

<tr>
<td>Emergency Contact</td>
<td><input type="tel"/></td>
</tr>

<tr>
<td>Insurance Available</td>
<td>
<input type="radio" name="insurance"/>Yes
<input type="radio" name="insurance"/>No
</td>
</tr>

<tr>
<td>Insurance Number</td>
<td><input type="text"/></td>
</tr>

<tr>
<td></td>
<td>
<input type="submit" value="Book Appointment"/>
<input type="reset" value="Reset"/>
</td>
</tr>
</table>
</form>
</fieldset>
</body>
</html>
