<html>
<head>
<style>

#body{
height:1000px;
width:1000px;
border:1px solid black;
}

#top{

}

#flagrow{
height:650px;
width:1000px;
}

height:180px;

}

}

width:300px;

float:left;
}

width:300px;

}

#white{

width:123px;

}

width:50px;
border:3px solid navy;

}

#right{

width:121px;
float:left;
}

#green{
height:60px;
width:300px;

}

/* Space after flag */


/* Base Row */

height:180px;
width:1000px;
}

#basespace{
height:180px;
width:120px;
float:left;
}

#base{
height:180px;
width:300px;
float:left;
}

height:60px;
width:300px;
}

#gap1{

width:75px;
float:left;
}

#b1,#b2{
height:60px;
width:75px;

/* 3 Blocks */

height:60px;
width:300px;
}

#gap2{
height:60px;
width:37px;

height:60px;
width:75px;
background-color:white;
border:1px solid black;
box-sizing:border-box;
float:left;
}

/* 4 Blocks */
#r3{
height:60px;
width:300px;
}

#b6,#b7,#b8,#b9{
height:60px;
width:75px;
background-color:green;
border:1px solid black;
box-sizing:border-box;
float:left;
}

</div>

</div>

<div id="mid"></div>

</div>

<div id="r3">

</div>

</div>
